[project]
name = "jlc-comfyui-nodes"
version = "1.1.0"
description = "A collection of workflow-focused ComfyUI nodes designed to simplify, standardize, and optimize advanced image generation pipelines. Includes image padding and unified mask generation for combined inpainting and outpainting workflows, along with structured ControlNet application through the JLC ControlNet Apply (Advanced) node. This node features lazy loading and global ControlNet caching to eliminate duplicate model loads and significantly reduce VRAM usage in complex graphs. The package also includes flexible LoRA utilities, such as a sequential loader stack (up to 10 LoRAs) and a block-weight-enabled loader for fine-grained layer control. Designed for Flux-based pipelines, reusable workflow construction, and efficient experimentation with modern diffusion models."
authors = [
    { name = "J. L. Córdova", email = "jose.l.cordova@gmail.com" }
]
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"

keywords = [
    "comfyui",
    "comfyui-nodes",
    "comfyui-workflows",
    "stable-diffusion",
    "flux",
    "flux-workflows",
    "lora",
    "lora-loaders",
    "lora-stack",
    "controlnet",
    "controlnet-optimization",
    "inpainting",
    "inpainting-pipeline",
    "outpainting",
    "image-generation",
    "workflow",
]

classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Topic :: Multimedia :: Graphics",
]

[project.urls]
Homepage = "https://github.com/Damkohler/jlc-comfyui-nodes"
Repository = "https://github.com/Damkohler/jlc-comfyui-nodes"
Issues = "https://github.com/Damkohler/jlc-comfyui-nodes/issues"

[tool.comfy]
supported_comfyui_version = ">=0.2"
PublisherId = "damkohler"
DisplayName = "JLC ComfyUI Nodes"
Icon = "https://raw.githubusercontent.com/Damkohler/jlc-comfyui-nodes/main/assets/icons/jlc-comfyui-nodes_Logo-0512.png"
Category = "nodes"
Homepage = "https://github.com/Damkohler/jlc-comfyui-nodes"